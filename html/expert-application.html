<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请成为评审专家 - 趣学术CRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        /* 医生自助申请页面样式 */
        .application-form {
            max-width: 800px;
            margin: 0 auto;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: 8px;
        }
        .form-section-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
        /* 专长领域选择 */
        .specialty-select {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .specialty-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .specialty-item label {
            font-weight: normal;
            cursor: pointer;
        }
        /* 资质证明上传 */
        .qualification-upload {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .upload-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        .upload-item input[type="file"] {
            flex: 1;
        }
        .remove-file {
            cursor: pointer;
            color: #ef4444;
        }
        .add-upload {
            background: none;
            border: 1px dashed #ddd;
            padding: 15px;
            border-radius: 4px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-upload:hover {
            border-color: #667eea;
            color: #667eea;
        }
        /* 操作按钮 */
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        /* 提示信息 */
        .hint-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 组件加载已移至script.js模块化管理 -->

    <!-- 顶部导航栏占位符 -->
    <div id="header-placeholder"></div>

    <!-- 主体布局 -->
    <div class="main-container">
        <!-- 左侧侧边栏占位符 -->
        <div id="sidebar-placeholder"></div>

        <!-- 右侧主要内容区域 -->
        <main class="content-area">
            <!-- 页面标题和返回按钮 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="page-title">申请成为评审专家</h1>
                <button class="btn btn-secondary" onclick="history.back()">返回</button>
            </div>
            
            <!-- 白色背景容器，包含所有内容 -->
            <div class="white-content-container">
                <form id="expertApplicationForm" class="application-form">
                    <!-- 基本信息区域 -->
                    <div class="form-section">
                        <div class="form-section-title">基本信息</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="doctorName">姓名</label>
                                <input type="text" id="doctorName" value="张医生" readonly>
                                <div class="hint-text">该信息来自您的医生档案，不可修改</div>
                            </div>
                            <div class="form-group">
                                <label for="hospital">医院</label>
                                <input type="text" id="hospital" value="北京协和医院" readonly>
                                <div class="hint-text">该信息来自您的医生档案，不可修改</div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="department">科室</label>
                                <input type="text" id="department" value="心内科" readonly>
                                <div class="hint-text">该信息来自您的医生档案，不可修改</div>
                            </div>
                            <div class="form-group">
                                <label for="title">职称</label>
                                <input type="text" id="title" value="主任医师" readonly>
                                <div class="hint-text">该信息来自您的医生档案，不可修改</div>
                            </div>
                        </div>
                    </div>

                    <!-- 申请信息区域 -->
                    <div class="form-section">
                        <div class="form-section-title">申请信息</div>
                        
                        <!-- 专长领域 -->
                        <div class="form-group">
                            <label>专长领域 <span style="color: #ef4444;">*</span></label>
                            <div class="specialty-select">
                                <div class="specialty-item">
                                    <input type="checkbox" id="specialty1" name="specialties" value="冠心病">
                                    <label for="specialty1">冠心病</label>
                                </div>
                                <div class="specialty-item">
                                    <input type="checkbox" id="specialty2" name="specialties" value="高血压">
                                    <label for="specialty2">高血压</label>
                                </div>
                                <div class="specialty-item">
                                    <input type="checkbox" id="specialty3" name="specialties" value="心律失常">
                                    <label for="specialty3">心律失常</label>
                                </div>
                                <div class="specialty-item">
                                    <input type="checkbox" id="specialty4" name="specialties" value="心力衰竭">
                                    <label for="specialty4">心力衰竭</label>
                                </div>
                                <div class="specialty-item">
                                    <input type="checkbox" id="specialty5" name="specialties" value="心肌病">
                                    <label for="specialty5">心肌病</label>
                                </div>
                                <div class="specialty-item">
                                    <input type="checkbox" id="specialty6" name="specialties" value="心脏瓣膜病">
                                    <label for="specialty6">心脏瓣膜病</label>
                                </div>
                            </div>
                            <div class="hint-text">请选择您的专长领域，可多选</div>
                        </div>

                        <!-- 资质证明 -->
                        <div class="form-group">
                            <label>资质证明 <span style="color: #ef4444;">*</span></label>
                            <div class="qualification-upload" id="qualificationUpload">
                                <div class="upload-item">
                                    <input type="file" name="qualifications[]" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                                    <span class="remove-file" onclick="removeUploadItem(this)">×</span>
                                </div>
                                <button type="button" class="add-upload" onclick="addUploadItem()">+ 添加文件</button>
                            </div>
                            <div class="hint-text">请上传您的资质证明文件，如职称证书、学术成果证明等，支持PDF、Word、图片格式</div>
                        </div>

                        <!-- 申请理由 -->
                        <div class="form-group">
                            <label for="applicationReason">申请理由 <span style="color: #ef4444;">*</span></label>
                            <textarea id="applicationReason" placeholder="请详细说明您申请成为评审专家的理由、您的专业能力和相关经验等" required></textarea>
                            <div class="hint-text">请详细描述您的专业背景、评审经验和申请动机，字数建议不少于200字</div>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="history.back()">取消</button>
                        <button type="button" class="btn btn-secondary" onclick="saveDraft()">保存草稿</button>
                        <button type="submit" class="btn btn-primary">提交申请</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // 添加上传项
        function addUploadItem() {
            const uploadContainer = document.getElementById('qualificationUpload');
            const addButton = uploadContainer.querySelector('.add-upload');
            
            const newUploadItem = document.createElement('div');
            newUploadItem.className = 'upload-item';
            newUploadItem.innerHTML = `
                <input type="file" name="qualifications[]" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                <span class="remove-file" onclick="removeUploadItem(this)">×</span>
            `;
            
            uploadContainer.insertBefore(newUploadItem, addButton);
        }

        // 移除上传项
        function removeUploadItem(element) {
            const uploadItem = element.closest('.upload-item');
            const uploadContainer = document.getElementById('qualificationUpload');
            
            // 至少保留一个上传项
            if (uploadContainer.querySelectorAll('.upload-item').length > 1) {
                uploadItem.remove();
            }
        }

        // 保存草稿
        function saveDraft() {
            // 这里可以添加保存草稿的逻辑
            alert('草稿保存成功！');
        }

        // 表单提交处理
        document.getElementById('expertApplicationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 表单验证
            const specialties = document.querySelectorAll('input[name="specialties"]:checked');
            const qualificationFiles = document.querySelectorAll('input[name="qualifications[]"]');
            const applicationReason = document.getElementById('applicationReason').value.trim();
            
            // 检查专长领域是否至少选择一个
            if (specialties.length === 0) {
                alert('请至少选择一个专长领域');
                return;
            }
            
            // 检查是否至少上传一个资质证明
            let hasFile = false;
            qualificationFiles.forEach(fileInput => {
                if (fileInput.files.length > 0) {
                    hasFile = true;
                }
            });
            if (!hasFile) {
                alert('请至少上传一个资质证明文件');
                return;
            }
            
            // 检查申请理由是否填写
            if (applicationReason === '') {
                alert('请填写申请理由');
                return;
            }
            
            // 检查申请理由字数
            if (applicationReason.length < 200) {
                alert('申请理由建议不少于200字');
                return;
            }
            
            // 这里可以添加表单提交逻辑
            alert('申请提交成功！我们将尽快审核您的申请。');
            history.back();
        });
    </script>
</body>
</html>
