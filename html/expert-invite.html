<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专家邀约 - 趣学术CRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/medical-podcast.css">
    <style>
        /* 固定顶部栏样式 */
        .fixed-header-bar {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--background-primary);
            border-bottom: 1px solid var(--border-light);
            box-shadow: none;
            z-index: 100;
            padding: 12px var(--spacing-lg);
            margin-bottom: 0;
            border-top: none;
            box-sizing: border-box;
            width: 100%;
        }

        .fixed-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-md);
            width: 100%;
            box-sizing: border-box;
            max-width: 100%;
        }

        .fixed-header-content .header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-shrink: 0;
        }

        .fixed-header-content .header-center {
            flex: 1;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fixed-header-content .header-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-shrink: 0;
        }

        /* 带固定头部的内容容器 */
        .white-content-container.with-fixed-header {
            margin-top: 0;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--border-light);
            color: var(--text-secondary);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background-color: var(--border-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            color: var(--text-primary);
        }
        
        /* 右侧内容区域 */
        .right-content {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        /* 专家邀约页面样式 */
        .invite-page {
            max-width: 1200px;
            margin: 0 auto;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 500;
            color: #333;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        /* 筛选条件区域 */
        .filter-section {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 20px;
            padding: 16px;
            background-color: #f8fafc;
            border-radius: var(--radius-lg);
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 150px;
        }
        .filter-group label {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        .filter-group input,
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            min-width: 150px;
        }
        /* 专家列表区域 */
        .expert-list-section {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .expert-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e0e0e0;
        }
        .expert-list-title {
            font-weight: 500;
            color: #333;
        }
        .expert-list-actions {
            display: flex;
            gap: 10px;
        }
        .expert-list-table {
            width: 100%;
            border-collapse: collapse;
        }
        .expert-list-table th,
        .expert-list-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .expert-list-table th {
            background-color: #fafafa;
            font-weight: 500;
            color: #333;
        }
        .expert-list-table tbody tr:hover {
            background-color: #f7fafc;
        }
        /* 邀约信息区域 */
        .invite-info-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }
        /* 批量操作样式 */
        .batch-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        /* 已选专家列表 */
        .selected-experts {
            margin-bottom: 20px;
            padding: 16px;
            background-color: #f8fafc;
            border-radius: var(--radius-lg);
        }
        .selected-experts-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .selected-expert-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .selected-expert-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background-color: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            box-shadow: none;
        }
        .selected-expert-tag:hover {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(0);
            box-shadow: none;
        }
        .remove-expert {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }
        .selected-expert-tag:hover .remove-expert {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- 组件加载已移至script.js模块化管理 -->

    <!-- 顶部导航栏占位符 -->
    <div id="header-placeholder"></div>

    <!-- 主体布局 -->
    <div class="main-container">
        <!-- 左侧侧边栏占位符 -->
        <div id="sidebar-placeholder"></div>

        <!-- 右侧内容区域，包含固定顶部栏和主要内容 -->
        <div class="right-content">
            <!-- 固定顶部栏，包含返回按钮 -->
            <div class="fixed-header-bar">
                <div class="fixed-header-content">
                    <div class="header-left">
                        <button class="btn btn-secondary back-btn" onclick="history.back()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                            返回列表
                        </button>
                    </div>
                    <div class="header-right">
                        <!-- 可以在这里添加其他操作按钮 -->
                    </div>
                </div>
            </div>
            
            <!-- 主要内容区域 -->
            <main class="content-area">
                <!-- 白色背景容器，包含所有内容 -->
                <div class="white-content-container with-fixed-header">
                    <div class="invite-page">
                    <!-- 邀约方式标签页 -->
                    <div class="content-tabs">
                        <div class="tab-item active" data-tab="direct">指定医生邀约</div>
                        <div class="tab-item" data-tab="filter">筛选条件邀约</div>
                    </div>

                    <!-- 邀约内容表单 -->
                    <form id="inviteForm">
                        <!-- 指定医生邀约内容 -->
                        <div class="tab-content active" id="content-direct">
                            <!-- 功能区一行展示 -->
                            <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; background-color: #f8fafc; padding: 16px; border-radius: var(--radius-lg);">
                                <!-- 左侧：搜索和筛选区域 -->
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div style="display: flex; align-items: center;">
                                        
                                        <input type="text" id="doctorName" placeholder="请输入医生姓名" style="width: 150px; height: 36px; padding: 0 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md);">
                                    </div>
                                    <div style="display: flex; align-items: center;">
                                        
                                        <input type="text" id="doctorPhone" placeholder="请输入医生手机号" style="width: 150px; height: 36px; padding: 0 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md);">
                                    </div>
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        <button type="button" class="btn btn-primary" style="height: 36px; padding: 0 16px;">搜索</button>
                                        <button type="button" class="btn btn-secondary" style="height: 36px; padding: 0 16px;">重置</button>
                                    </div>
                                </div>
                            </div>

                            <!-- 搜索结果区域 -->
                            <div class="table-container">
                                <table class="data-table record-table">
                                    <thead>
                                        <tr>
                                            <th style="width: 50px;"><input type="checkbox" id="selectAllDirect"></th>
                                            <th>姓名</th>
                                            <th>医院</th>
                                            <th>科室</th>
                                            <th>职称</th>
                                        </tr>
                                    </thead>
                                    <tbody id="directSearchResults">
                                        <!-- 搜索结果将动态填充 -->
                                        <tr>
                                            <td><input type="checkbox" name="selectedExperts" value="1"></td>
                                            <td>
                                                <div class="material-title">张医生</div>
                                            </td>
                                            <td>北京协和医院</td>
                                            <td>心内科</td>
                                            <td>主任医师</td>
                                        </tr>
                                        <tr>
                                            <td><input type="checkbox" name="selectedExperts" value="2"></td>
                                            <td>
                                                <div class="material-title">李医生</div>
                                            </td>
                                            <td>上海瑞金医院</td>
                                            <td>内分泌科</td>
                                            <td>副主任医师</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- 批量操作区域 -->
                            <div class="batch-actions" style="display: flex; gap: 10px; margin-top: 10px; margin-bottom: 20px;">
                                <button type="button" class="btn btn-primary">全选</button>
                                <button type="button" class="btn btn-secondary">取消全选</button>
                            </div>
                        </div>

                        <!-- 筛选条件邀约内容 -->
                        <div class="tab-content" id="content-filter">
                            <!-- 功能区一行展示 -->
                            <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; background-color: #f8fafc; padding: 16px; border-radius: var(--radius-lg);">
                                <!-- 左侧：搜索和筛选区域 -->
                                <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                                    <div style="display: flex; align-items: center;">
                                        
                                        <select id="filterHospital" style="width: 150px; height: 36px; padding: 0 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md);">
                                            <option value="">全部医院</option>
                                            <option value="北京协和医院">北京协和医院</option>
                                            <option value="上海瑞金医院">上海瑞金医院</option>
                                            <option value="广州中山医院">广州中山医院</option>
                                        </select>
                                    </div>
                                    <div style="display: flex; align-items: center;">
                                        
                                        <select id="filterDepartment" style="width: 150px; height: 36px; padding: 0 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md);">
                                            <option value="">全部科室</option>
                                            <option value="心内科">心内科</option>
                                            <option value="内分泌科">内分泌科</option>
                                            <option value="神经内科">神经内科</option>
                                            <option value="骨科">骨科</option>
                                        </select>
                                    </div>
                                    <div style="display: flex; align-items: center;">
                                        
                                        <select id="filterTitle" style="width: 150px; height: 36px; padding: 0 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md);">
                                            <option value="">全部职称</option>
                                            <option value="主任医师">主任医师</option>
                                            <option value="副主任医师">副主任医师</option>
                                            <option value="主治医师">主治医师</option>
                                        </select>
                                    </div>
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        <button type="button" class="btn btn-primary" style="height: 36px; padding: 0 16px;">筛选</button>
                                        <button type="button" class="btn btn-secondary" style="height: 36px; padding: 0 16px;">重置</button>
                                    </div>
                                </div>
                            </div>

                            <!-- 专家列表区域 -->
                            <div class="table-container">
                                <table class="data-table record-table">
                                    <thead>
                                        <tr>
                                            <th style="width: 50px;"><input type="checkbox" id="selectAllFilter"></th>
                                            <th>姓名</th>
                                            <th>医院</th>
                                            <th>科室</th>
                                            <th>职称</th>
                                        </tr>
                                    </thead>
                                    <tbody id="filteredExperts">
                                        <!-- 筛选结果将动态填充 -->
                                        <tr>
                                            <td><input type="checkbox" name="selectedExperts" value="1"></td>
                                            <td>
                                                <div class="material-title">张医生</div>
                                            </td>
                                            <td>北京协和医院</td>
                                            <td>心内科</td>
                                            <td>主任医师</td>
                                        </tr>
                                        <tr>
                                            <td><input type="checkbox" name="selectedExperts" value="2"></td>
                                            <td>
                                                <div class="material-title">李医生</div>
                                            </td>
                                            <td>上海瑞金医院</td>
                                            <td>内分泌科</td>
                                            <td>副主任医师</td>
                                        </tr>
                                        <tr>
                                            <td><input type="checkbox" name="selectedExperts" value="3"></td>
                                            <td>
                                                <div class="material-title">王医生</div>
                                            </td>
                                            <td>广州中山医院</td>
                                            <td>神经内科</td>
                                            <td>主任医师</td>
                                        </tr>
                                        <tr>
                                            <td><input type="checkbox" name="selectedExperts" value="4"></td>
                                            <td>
                                                <div class="material-title">赵医生</div>
                                            </td>
                                            <td>成都华西医院</td>
                                            <td>骨科</td>
                                            <td>副主任医师</td>
                                            
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- 批量操作区域 -->
                            <div class="batch-actions" style="display: flex; gap: 10px; margin-top: 10px; margin-bottom: 20px;">
                                <button type="button" class="btn btn-primary">全选</button>
                                <button type="button" class="btn btn-secondary">取消全选</button>
                            </div>
                        </div>

                        <!-- 已选专家区域 -->
                        <div class="selected-experts">
                            <div class="selected-experts-title">已选专家 (<span id="selectedCount">0</span>)</div>
                            <div id="selectedExpertTags" class="selected-expert-tags">
                                <!-- 已选专家标签将动态填充 -->
                            </div>
                        </div>

                        <!-- 邀约信息区域 -->
                        <div style="border-top: 1px solid #e0e0e0; padding-top: 30px; margin-top: 30px;">
                            <h3 style="margin-bottom: 20px;">邀约信息</h3>
                            
                            <!-- 邀约目的 -->
                            <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
                                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                                    <label for="invitePurpose" style="font-weight: 500; color: #333;">邀约目的 <span style="color: #ff4d4f;">*</span></label>
                                    <select id="invitePurpose" required style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
                                        <option value="">请选择邀约目的</option>
                                        <option value="expert_review">评审专家邀约 - 参与医学内容评审</option>
                                    </select>
                                    <small style="color: #666; font-size: 12px;">选择邀约目的，系统将自动生成对应邀约内容模板</small>
                                </div>
                            </div>
                            
                            <!-- 邀约主题 -->
                            <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
                                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                                    <label for="subject" style="font-weight: 500; color: #333;">邀约主题 <span style="color: #ff4d4f;">*</span></label>
                                    <input type="text" id="subject" placeholder="例如：诚邀您成为趣学术平台评审专家" required style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
                                </div>
                            </div>

                            <!-- 邀约内容 -->
                            <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
                                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                                    <label for="content" style="font-weight: 500; color: #333;">邀约内容 <span style="color: #ff4d4f;">*</span></label>
                                    <textarea id="content" placeholder="请详细说明成为专家的目的、职责、权益和要求" required style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; resize: vertical; min-height: 200px;"></textarea>
                                </div>
                            </div>
                        
                            
                            <!-- 专家权益说明 -->
                            <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
                                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                                    <label for="benefits" style="font-weight: 500; color: #333;">专家权益说明</label>
                                    <textarea id="benefits" placeholder="请详细说明专家可享受的权益，如：报酬、学术交流机会、认证等" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; resize: vertical; min-height: 100px;"></textarea>
                                </div>
                            </div>

                            <!-- 操作按钮 -->
                            <div style="display: flex; gap: 10px; margin-top: 20px;">
                                <button type="button" class="btn btn-secondary" onclick="history.back()">取消</button>
                                <button type="submit" class="btn btn-primary">发送邀约</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // 邀约方式标签切换
        document.addEventListener('DOMContentLoaded', function() {
            const inviteTabs = document.querySelectorAll('.tab-item');
            const tabContents = document.querySelectorAll('.tab-content');

            inviteTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetTab = tab.dataset.tab;
                    
                    // 移除所有激活状态
                    inviteTabs.forEach(t => t.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    
                    // 添加当前激活状态
                    tab.classList.add('active');
                    document.getElementById(`content-${targetTab}`).classList.add('active');
                });
            });

            // 移除了无效的expiryDate设置，因为HTML中没有该元素

            // 全选/取消全选功能
            document.getElementById('selectAllDirect').addEventListener('change', function() {
                const checkboxes = document.querySelectorAll('#directSearchResults input[type="checkbox"]');
                checkboxes.forEach(checkbox => {
                    checkbox.checked = this.checked;
                });
                updateSelectedExperts();
            });

            document.getElementById('selectAllFilter').addEventListener('change', function() {
                const checkboxes = document.querySelectorAll('#filteredExperts input[type="checkbox"]');
                checkboxes.forEach(checkbox => {
                    checkbox.checked = this.checked;
                });
                updateSelectedExperts();
            });

            // 搜索功能
            document.querySelectorAll('#content-direct .btn-primary')[0].addEventListener('click', function() {
                const doctorName = document.getElementById('doctorName').value;
                const doctorPhone = document.getElementById('doctorPhone').value;
                
                // 1. 显示加载状态
                const searchBtn = this;
                const originalBtnText = searchBtn.textContent;
                searchBtn.textContent = '搜索中...';
                searchBtn.disabled = true;
                
                const directResults = document.getElementById('directSearchResults');
                directResults.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #666;">正在搜索中...</td></tr>';
                
                // 模拟网络延迟
                setTimeout(() => {
                    // 2. 生成更真实的搜索结果
                    let resultsHTML = '';
                    
                    if (doctorName || doctorPhone) {
                        // 模拟搜索到的结果（更丰富的数据）
                        const searchResults = [
                            { id: 1, name: doctorName || '张医生', hospital: '北京协和医院', department: '心内科', title: '主任医师' },
                            { id: 2, name: '李医生', hospital: '上海瑞金医院', department: '内分泌科', title: '副主任医师' },
                            { id: 3, name: '王医生', hospital: '广州中山医院', department: '神经内科', title: '主任医师' }
                        ];
                        
                        resultsHTML = searchResults.map(result => `
                            <tr>
                                <td><input type="checkbox" name="selectedExperts" value="${result.id}"></td>
                                <td>
                                    <div class="material-title">${result.name}</div>
                                </td>
                                <td>${result.hospital}</td>
                                <td>${result.department}</td>
                                <td>${result.title}</td>
                            </tr>
                        `).join('');
                    } else {
                        // 显示所有可用专家
                        const allExperts = [
                            { id: 1, name: '张医生', hospital: '北京协和医院', department: '心内科', title: '主任医师' },
                            { id: 2, name: '李医生', hospital: '上海瑞金医院', department: '内分泌科', title: '副主任医师' },
                            { id: 3, name: '王医生', hospital: '广州中山医院', department: '神经内科', title: '主任医师' },
                            { id: 4, name: '赵医生', hospital: '成都华西医院', department: '骨科', title: '副主任医师' },
                            { id: 5, name: '刘医生', hospital: '北京301医院', department: '呼吸科', title: '主任医师' }
                        ];
                        
                        resultsHTML = allExperts.map(expert => `
                            <tr>
                                <td><input type="checkbox" name="selectedExperts" value="${expert.id}"></td>
                                <td>
                                    <div class="material-title">${expert.name}</div>
                                </td>
                                <td>${expert.hospital}</td>
                                <td>${expert.department}</td>
                                <td>${expert.title}</td>
                            </tr>
                        `).join('');
                    }
                    
                    // 3. 更新结果
                    directResults.innerHTML = resultsHTML || '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #666;">未找到匹配的医生</td></tr>';
                    
                    // 4. 恢复按钮状态
                    searchBtn.textContent = originalBtnText;
                    searchBtn.disabled = false;
                    
                    // 5. 重新绑定事件
                    const selectAllDirect = document.getElementById('selectAllDirect');
                    selectAllDirect.removeEventListener('change', function() {}); // 移除旧事件
                    selectAllDirect.addEventListener('change', function() {
                        const checkboxes = document.querySelectorAll('#directSearchResults input[type="checkbox"]');
                        checkboxes.forEach(checkbox => {
                            checkbox.checked = this.checked;
                        });
                        updateSelectedExperts();
                    });
                    
                    // 为新的复选框添加change事件
                    const checkboxes = document.querySelectorAll('#directSearchResults input[type="checkbox"]');
                    checkboxes.forEach(checkbox => {
                        checkbox.addEventListener('change', function(e) {
                            if (e.target.type === 'checkbox' && e.target.name === 'selectedExperts') {
                                updateSelectedExperts();
                            }
                        });
                    });
                }, 800); // 800ms模拟网络延迟
            });

            // 筛选功能
            document.querySelectorAll('#content-filter .btn-primary')[0].addEventListener('click', function() {
                const hospital = document.getElementById('filterHospital').value;
                const department = document.getElementById('filterDepartment').value;
                const title = document.getElementById('filterTitle').value;
                const specialty = document.getElementById('filterSpecialty').value;
                
                // 1. 显示加载状态
                const filterBtn = this;
                const originalBtnText = filterBtn.textContent;
                filterBtn.textContent = '筛选中...';
                filterBtn.disabled = true;
                
                const filteredResults = document.getElementById('filteredExperts');
                filteredResults.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #666;">正在筛选中...</td></tr>';
                
                // 模拟网络延迟
                setTimeout(() => {
                    // 2. 生成更真实的筛选结果
                    const allExperts = [
                        { id: 1, name: '张医生', hospital: '北京协和医院', department: '心内科', title: '主任医师', specialty: '冠心病、高血压' },
                        { id: 2, name: '李医生', hospital: '上海瑞金医院', department: '内分泌科', title: '副主任医师', specialty: '糖尿病、甲状腺疾病' },
                        { id: 3, name: '王医生', hospital: '广州中山医院', department: '神经内科', title: '主任医师', specialty: '脑血管病、癫痫' },
                        { id: 4, name: '赵医生', hospital: '成都华西医院', department: '骨科', title: '副主任医师', specialty: '关节外科、脊柱外科' },
                        { id: 5, name: '刘医生', hospital: '北京301医院', department: '呼吸科', title: '主任医师', specialty: '哮喘、慢性阻塞性肺疾病' },
                        { id: 6, name: '陈医生', hospital: '上海华山医院', department: '神经外科', title: '主任医师', specialty: '脑肿瘤、脑血管病' },
                        { id: 7, name: '杨医生', hospital: '广州南方医院', department: '普外科', title: '副主任医师', specialty: '肝胆外科、腹腔镜手术' },
                        { id: 8, name: '黄医生', hospital: '武汉同济医院', department: '心内科', title: '主治医师', specialty: '心律失常、心力衰竭' }
                    ];
                    
                    // 3. 应用筛选条件
                    const filtered = allExperts.filter(expert => {
                        let matches = true;
                        
                        if (hospital && expert.hospital !== hospital) {
                            matches = false;
                        }
                        
                        if (department && expert.department !== department) {
                            matches = false;
                        }
                        
                        if (title && expert.title !== title) {
                            matches = false;
                        }
                        
                        if (specialty && !expert.specialty.includes(specialty)) {
                            matches = false;
                        }
                        
                        return matches;
                    });
                    
                    // 4. 生成筛选结果HTML
                    let resultsHTML = '';
                    if (filtered.length > 0) {
                        resultsHTML = filtered.map(expert => `
                            <tr>
                                <td><input type="checkbox" name="selectedExperts" value="${expert.id}"></td>
                                <td>
                                    <div class="material-title">${expert.name}</div>
                                </td>
                                <td>${expert.hospital}</td>
                                <td>${expert.department}</td>
                                <td>${expert.title}</td>
                                <td>${expert.specialty}</td>
                            </tr>
                        `).join('');
                    } else {
                        resultsHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #666;">未找到符合条件的专家</td></tr>';
                    }
                    
                    // 5. 更新结果
                    filteredResults.innerHTML = resultsHTML;
                    
                    // 6. 恢复按钮状态
                    filterBtn.textContent = originalBtnText;
                    filterBtn.disabled = false;
                    
                    // 7. 重新绑定事件
                    const selectAllFilter = document.getElementById('selectAllFilter');
                    selectAllFilter.removeEventListener('change', function() {}); // 移除旧事件
                    selectAllFilter.addEventListener('change', function() {
                        const checkboxes = document.querySelectorAll('#filteredExperts input[type="checkbox"]');
                        checkboxes.forEach(checkbox => {
                            checkbox.checked = this.checked;
                        });
                        updateSelectedExperts();
                    });
                    
                    // 为新的复选框添加change事件
                    const checkboxes = document.querySelectorAll('#filteredExperts input[type="checkbox"]');
                    checkboxes.forEach(checkbox => {
                        checkbox.addEventListener('change', function(e) {
                            if (e.target.type === 'checkbox' && e.target.name === 'selectedExperts') {
                                updateSelectedExperts();
                            }
                        });
                    });
                }, 800); // 800ms模拟网络延迟
            });

            // 重置筛选 - 筛选条件邀约标签页
            document.querySelectorAll('#content-filter .btn-secondary')[0].addEventListener('click', function() {
                document.getElementById('filterHospital').value = '';
                document.getElementById('filterDepartment').value = '';
                document.getElementById('filterTitle').value = '';
                document.getElementById('filterSpecialty').value = '';
            });

            // 重置筛选 - 指定医生邀约标签页
            document.querySelectorAll('#content-direct .btn-secondary')[0].addEventListener('click', function() {
                document.getElementById('doctorName').value = '';
                document.getElementById('doctorPhone').value = '';
            });

            // 单个复选框变化时更新已选专家
            document.addEventListener('change', function(e) {
                if (e.target.type === 'checkbox' && e.target.name === 'selectedExperts') {
                    updateSelectedExperts();
                }
            });

            // 批量操作功能 - 为所有批量操作按钮添加事件监听器
            // 使用事件委托处理所有批量操作按钮点击
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('.batch-actions button');
                if (!btn) return;
                
                // 获取当前激活的标签页
                const activeTab = document.querySelector('.tab-item.active').dataset.tab;
                
                // 根据激活的标签页选择对应的专家列表
                const checkboxSelector = activeTab === 'direct' 
                    ? '#directSearchResults input[type="checkbox"]' 
                    : '#filteredExperts input[type="checkbox"]';
                
                const checkboxes = document.querySelectorAll(checkboxSelector);
                
                // 根据按钮类型执行相应操作
                if (btn.classList.contains('btn-primary')) {
                    // 全选
                    checkboxes.forEach(checkbox => {
                        checkbox.checked = true;
                    });
                } else if (btn.textContent.includes('取消全选')) {
                    // 取消全选
                    checkboxes.forEach(checkbox => {
                        checkbox.checked = false;
                    });
                } else if (btn.textContent.includes('反选')) {
                    // 反选
                    checkboxes.forEach(checkbox => {
                        checkbox.checked = !checkbox.checked;
                    });
                }
                
                updateSelectedExperts();
            });

            // 更新已选专家列表
            function updateSelectedExperts() {
                const selectedCheckboxes = document.querySelectorAll('input[name="selectedExperts"]:checked');
                const selectedCount = selectedCheckboxes.length;
                const selectedTagsContainer = document.getElementById('selectedExpertTags');
                const selectedCountElement = document.getElementById('selectedCount');

                // 更新已选数量
                selectedCountElement.textContent = selectedCount;

                // 清空现有标签
                selectedTagsContainer.innerHTML = '';

                // 如果没有选中专家，显示提示信息
                if (selectedCount === 0) {
                    const emptyHint = document.createElement('div');
                    emptyHint.style.color = '#666';
                    emptyHint.style.fontSize = '14px';
                    emptyHint.textContent = '暂未选择';
                    selectedTagsContainer.appendChild(emptyHint);
                    return;
                }

                // 添加新标签
                selectedCheckboxes.forEach(checkbox => {
                    const row = checkbox.closest('tr');
                    const nameElement = row.cells[1].querySelector('.material-title') || row.cells[1];
                    const name = nameElement.textContent.trim();
                    const hospital = row.cells[2].textContent;
                    const expertId = checkbox.value;

                    const tag = document.createElement('div');
                    tag.className = 'selected-expert-tag';

                    tag.innerHTML = `
                        <span>${name} <small style="opacity: 0.8;">(${hospital})</small></span>
                        <span class="remove-expert" data-id="${expertId}">×</span>
                    `;
                    
                    selectedTagsContainer.appendChild(tag);
                });

                // 添加移除事件
                document.querySelectorAll('.remove-expert').forEach(removeBtn => {
                    removeBtn.addEventListener('click', function() {
                        const expertId = this.dataset.id;
                        const checkboxes = document.querySelectorAll(`input[name="selectedExperts"][value="${expertId}"]`);
                        
                        // 添加移除动画效果
                        const tag = this.closest('.selected-expert-tag');
                        tag.style.transform = 'scale(0)';
                        tag.style.opacity = '0';
                        
                        setTimeout(() => {
                            checkboxes.forEach(checkbox => {
                                checkbox.checked = false;
                            });
                            updateSelectedExperts();
                        }, 200);
                    });
                });
            }

            // 邀约模板加载功能
            function loadInviteTemplate(templateType) {
                const contentTextarea = document.getElementById('content');
                const subjectInput = document.getElementById('subject');
                const benefitsTextarea = document.getElementById('benefits');
                
                // 预设邀约模板
                const templates = {
                    expert_review: {
                        subject: '诚邀您成为趣学术平台评审专家',
                        content: `尊敬的医生：

您好！我是趣学术平台的运营人员。

我们诚邀您成为趣学术平台的评审专家，参与医学内容的专业评审工作。

【邀约目的】
作为评审专家，您将负责对平台上的医学内容、学术资料、病例讨论等进行专业评审，确保内容的科学性、准确性和专业性。

【专家职责】
1. 对平台提交的医学内容进行专业评审和指导
2. 提供专业意见和建议，提升平台内容质量
3. 遵守平台评审规范和保密协议

【专家权益】
1. 获得平台颁发的专家认证证书
2. 优先参与平台组织的学术活动和会议
3. 提升个人学术影响力和行业知名度

期待您的加入，共同推动医学内容的规范化和高质量发展！

如有任何疑问，欢迎随时与我们联系。

此致
敬礼！

趣学术平台`,
                        benefits: 
`1. 评审报酬：根据评审工作量和质量获得相应报酬
2. 专家认证：获得平台颁发的官方专家认证证书
3. 学术交流：优先参与平台组织的学术会议、研讨会
4. 影响力提升：通过平台展示个人专业能力，提升行业影响力`
                    },
                };
                
                // 加载对应模板
                if (templates[templateType]) {
                    contentTextarea.value = templates[templateType].content;
                    subjectInput.value = templates[templateType].subject;
                    benefitsTextarea.value = templates[templateType].benefits;
                }
            }
            
            // 邀约目的选择变化时自动加载模板
            document.getElementById('invitePurpose').addEventListener('change', function() {
                const selectedPurpose = this.value;
                if (selectedPurpose) {
                    loadInviteTemplate(selectedPurpose);
                }
            });
            
            // 表单提交处理
            document.getElementById('inviteForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 1. 检查是否选择了专家
                const selectedCheckboxes = document.querySelectorAll('input[name="selectedExperts"]:checked');
                if (selectedCheckboxes.length === 0) {
                    alert('请至少选择一位专家');
                    return;
                }
                
                // 2. 验证必填字段
                const invitePurpose = document.getElementById('invitePurpose').value;
                const subject = document.getElementById('subject').value.trim();
                const content = document.getElementById('content').value.trim();
                const inviter = document.getElementById('inviter').value.trim();
                const inviterRole = document.getElementById('inviterRole').value;
                const expiryDate = document.getElementById('expiryDate').value;
                
                let isValid = true;
                let errorMessage = '';
                
                if (!invitePurpose) {
                    isValid = false;
                    errorMessage += '请选择邀约目的\n';
                }
                
                if (!subject) {
                    isValid = false;
                    errorMessage += '请输入邀约主题\n';
                }
                
                if (!content) {
                    isValid = false;
                    errorMessage += '请输入邀约内容\n';
                }
                
                if (!inviter) {
                    isValid = false;
                    errorMessage += '请输入邀约人姓名\n';
                }
                
                if (!inviterRole) {
                    isValid = false;
                    errorMessage += '请选择邀约人身份\n';
                }
                
                if (!expiryDate) {
                    isValid = false;
                    errorMessage += '请选择邀约有效期\n';
                } else {
                    // 验证日期是否为未来日期
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const selectedDate = new Date(expiryDate);
                    if (selectedDate < today) {
                        isValid = false;
                        errorMessage += '邀约有效期必须为未来日期\n';
                    }
                }
                
                if (!isValid) {
                    alert(errorMessage);
                    return;
                }
                
                // 3. 准备提交数据（模拟）
                const selectedExpertIds = Array.from(selectedCheckboxes).map(checkbox => checkbox.value);
                const selectedExpertNames = Array.from(selectedCheckboxes).map(checkbox => {
                    const row = checkbox.closest('tr');
                    const nameElement = row.cells[1].querySelector('.material-title') || row.cells[1];
                    return nameElement.textContent.trim();
                });
                
                // 4. 模拟提交过程
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalBtnText = submitBtn.textContent;
                submitBtn.textContent = '发送中...';
                submitBtn.disabled = true;
                
                // 模拟网络请求延迟
                setTimeout(() => {
                    // 5. 提交成功反馈
                    alert(`邀约发送成功！已向 ${selectedExpertNames.join('、')} 等 ${selectedExpertIds.length} 位专家发送邀约。\n\n邀约信息：\n主题：${subject}\n目的：${document.getElementById('invitePurpose').options[document.getElementById('invitePurpose').selectedIndex].text}\n邀约人：${inviter}（${document.getElementById('inviterRole').options[document.getElementById('inviterRole').selectedIndex].text}）`);
                    
                    // 6. 重置表单并返回列表
                    this.reset();
                    updateSelectedExperts(); // 清空已选专家
                    
                    // 恢复按钮状态
                    submitBtn.textContent = originalBtnText;
                    submitBtn.disabled = false;
                    
                    // 返回专家管理列表
                    history.back();
                }, 1500);
            });
        });
    </script>
</body>
</html>
