<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统入口 - 趣学术CRM</title>
    <link rel="stylesheet" href="../css/base.css">
</head>
<body>
    <!-- 组件加载脚本已移至navigation.js -->
    <script>
        // 确保DOM加载完成后执行初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 页面加载完成后，选中首页菜单项
            setTimeout(() => {
                // 移除所有左侧菜单的激活状态
                const allSidebarNavItems = document.querySelectorAll('.sidebar-nav .nav-item');
                allSidebarNavItems.forEach(item => {
                    item.classList.remove('active');
                });
                
                // 选中首页菜单项
                const homeNavItem = document.querySelector('.sidebar-nav .nav-item:first-child');
                if (homeNavItem) {
                    homeNavItem.classList.add('active');
                }
            }, 200);
        });
    </script>

    <!-- 顶部导航栏占位符 -->
    <div id="header-placeholder"></div>

    <!-- 主体布局 -->
    <div class="main-container">
        <!-- 左侧侧边栏占位符 -->
        <div id="sidebar-placeholder"></div>

        <!-- 右侧主要内容区域 -->
        <main class="content-area">
            <!-- 白色背景容器，包含所有内容 -->
            <div class="white-content-container">
                <!-- 系统入口提示 -->
                <div style="text-align: center; padding: 50px 0;">
                    <p style="font-size: 18px; color: #666; margin-top: 20px;">欢迎使用趣学术CRM系统</p>
                    <p style="font-size: 16px; color: #999; margin-top: 10px;">功能正在开发中</p>

                </div>
            </div>
        </main>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
